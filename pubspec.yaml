name: ticketscan_new
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0

  # Camera & Image
  camera: ^0.10.5+5
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Supabase
  supabase_flutter: ^2.12.0
  supabase_auth_ui: ^0.5.5

  # Payments
  in_app_purchase: ^3.2.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Autres dépendances
  shared_preferences: ^2.2.2

  # Networking & AI
  http: ^1.2.1
  connectivity_plus: ^6.0.3

  # Utils
  intl: any
  flutter_localizations:
    sdk: flutter
  js: ^0.6.7
  csv: ^6.0.0
  path_provider: ^2.1.3
  share_plus: ^10.1.0

  # State Management
  provider: ^6.1.1

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Variable d'environment
  flutter_dotenv: ^5.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
